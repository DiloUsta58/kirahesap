<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="icon" type="image/png" sizes="64x64" href="icons/icon-64.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f3b6d">



<title>Kira Ödeme Durumu</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="app-topbar">
      <button id="menuBtn" class="menu-btn" type="button" aria-label="Menü" aria-expanded="false">☰</button>
      <div id="pageTitle" class="app-title">TÜFE Kira Hesaplama</div>
      <nav id="appMenu" class="app-menu" aria-label="Uygulama menüsü">
        <button type="button" class="menu-item" data-page="sozlesmePage">Konut Kira Sözleşmesi</button>
        <button type="button" class="menu-item active" data-page="tufePage">TÜFE Kira Hesaplama</button>
        <button type="button" class="menu-item" data-action="saveData">Kaydet</button>
        <button type="button" class="menu-item" data-action="loadData">Veri Yükle</button>
      </nav>
    </header>
    <input id="backupFileInput" type="file" accept="application/json,.json" hidden>

    <main>
      <section id="tufePage" class="app-page active">
        <div class="table-wrapper">
          <table id="table">
            <thead></thead>
            <tbody></tbody>
            <tfoot></tfoot>
          </table>
        </div>
      </section>

      <section id="sozlesmePage" class="app-page sozlesme-page" aria-label="Konut Kira Sözleşmesi">
        <div class="sozlesme-layout">
          <aside class="contract-form" aria-label="Sözleşme bilgileri">
            <div class="form-head">
              <h1>Konut Kira Sözleşmesi</h1>
              <button id="printContractBtn" type="button">🖨 Yazdır</button>
            </div>
            <div id="sozlesmeForm"></div>
          </aside>
          <div id="previewResizeHandle" class="preview-resize-handle" role="separator" aria-label="Önizleme boyutunu değiştir"></div>
          <article id="contractPreview" class="contract-preview" aria-label="Sözleşme"></article>
        </div>
      </section>
    </main>
    <footer class="app-footer" aria-label="Uygulama bilgileri">
      <img class="footer-logo" src="icons/icon-32.png" alt="AppIcon">
      <span>© Dilaver Bölükbaşı</span>
      <span id="footerReleaseDate">Güncelleme tarihi: …</span>
      <span id="footerVersion">Sürüm: …</span>
      <span id="updateStatus" class="version-checking">Güncelleme kontrolü</span>
    </footer>
<script src="js/app.js"></script>
</body>
</html>
